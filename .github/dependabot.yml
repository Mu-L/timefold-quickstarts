version: 2

# Registries are defined in the organization settings.
multi-ecosystem-groups:
  base:
    schedule:
      interval: weekly
      time: '03:00' # Otherwise it picks a random time.
    target-branch: "development"
    commit-message:
      prefix: "deps: "
  # Big dependencies (Quarkus, Spring) are treated separately, so that we can decide to merge or not.
  quarkus:
    schedule:
      interval: weekly
      time: '03:00' # Otherwise it picks a random time.
    target-branch: "development"
    commit-message:
      prefix: "deps: "
  spring:
    schedule:
      interval: weekly
      time: '03:00' # Otherwise it picks a random time.
    target-branch: "development"
    commit-message:
      prefix: "deps: "

# Webjars are skipped entirely; we cannot retest the UI of every quickstarts every time a dependency bumps.
# Ignore only seems to work if allow is also defined.
updates:
  - package-ecosystem: "maven"
    directory: "/"
    patterns: [ "*" ]
    allow:
      - dependency-type: "all"
    ignore:
      - dependency-name: "org.webjars:*"
      - dependency-name: "io.quarkus:*"
      - dependency-name: "org.springframework:*"
      - dependency-name: "org.springframework.boot:*"
    multi-ecosystem-group: "base"
  - package-ecosystem: "gradle"
    directory: "/"
    patterns: [ "*" ]
    allow:
      - dependency-type: "all"
    ignore:
      - dependency-name: "org.webjars:*"
      - dependency-name: "io.quarkus"
      - dependency-name: "io.quarkus:*"
      - dependency-name: "org.springframework:*"
      - dependency-name: "org.springframework.boot:*"
    multi-ecosystem-group: "base"
  - package-ecosystem: "github-actions"
    directory: "/"
    patterns: [ "*" ]
    multi-ecosystem-group: "base"

  - package-ecosystem: "maven"
    directory: "/"
    patterns:
      - "io.quarkus:*"
    multi-ecosystem-group: "quarkus"
  - package-ecosystem: "gradle"
    directory: "/"
    patterns:
      - "io.quarkus"
      - "io.quarkus:*"
    multi-ecosystem-group: "quarkus"

  - package-ecosystem: "maven"
    directory: "/"
    patterns:
      - "org.springframework:*"
      - "org.springframework.boot:*"
    multi-ecosystem-group: "spring"
  - package-ecosystem: "gradle"
    directory: "/"
    patterns:
      - "org.springframework:*"
      - "org.springframework.boot:*"
    multi-ecosystem-group: "spring"
