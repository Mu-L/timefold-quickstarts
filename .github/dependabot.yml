version: 2

registries:
  enterprise:
    type: maven-repository
    url: https://timefold.jfrog.io/artifactory/releases/
    username: ${{ vars.JFROG_ENTERPRISE_READ_ONLY_ACCESS_USERNAME }}
    password: ${{ secrets.JFROG_ENTERPRISE_READ_ONLY_ACCESS_TOKEN }}

multi-ecosystem-groups:
  quickstarts:
    schedule:
      interval: weekly
      time: '03:00' # Otherwise it picks a random time.
    commit-message:
      prefix: "deps: "

updates:
  - package-ecosystem: "maven"
    registries:
      - enterprise
    directory: "/"
    patterns: [ "*" ]
    multi-ecosystem-group: "quickstarts"
  - package-ecosystem: "gradle"
    registries:
      - enterprise
    directory: "/"
    patterns: [ "*" ]
    multi-ecosystem-group: "quickstarts"
  - package-ecosystem: "github-actions"
    directory: "/"
    patterns: [ "*" ]
    multi-ecosystem-group: "quickstarts"
